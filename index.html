<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KitaPlaner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDoc, setDoc as setDocFS }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─────────────────────────────────────────────────────────────
// 🔧 FIREBASE CONFIG — hier deine Werte eintragen
// ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDmVjoz-UrRntxFyXuaYcGLtdTbN5INoqc",
  authDomain: "kitaplanner-f4904.firebaseapp.com",
  projectId: "kitaplanner-f4904",
  storageBucket: "kitaplanner-f4904.firebasestorage.app",
  messagingSenderId: "481955019001",
  appId: "1:481955019001:web:27052ed673ee22d47f0a28"
};

// ─────────────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── STATE ──────────────────────────────────────────────────
let currentUser = null;
let kinder  = [];
let tarife  = [];
let unsubKinder = null;
let unsubTarife = null;

const DEFAULT_TARIFE = [
  { id: "A", name: "Basis",    preis: 85,  beschr: "2–3 Tage/Woche" },
  { id: "B", name: "Standard", preis: 120, beschr: "3–4 Tage/Woche" },
  { id: "C", name: "Vollzeit", preis: 155, beschr: "5 Tage/Woche"   },
];

// ── AUTH ───────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) { showApp(); subscribeData(); }
  else      { showLogin(); }
});

window._login = async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  const err   = document.getElementById("loginErr");
  err.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    err.textContent = "Login fehlgeschlagen: " + (e.code === "auth/invalid-credential" ? "E-Mail oder Passwort falsch." : e.message);
  }
};

window._logout = async () => {
  if (unsubKinder) unsubKinder();
  if (unsubTarife) unsubTarife();
  await signOut(auth);
};

// ── FIRESTORE SUBSCRIPTIONS ────────────────────────────────
function subscribeData() {
  const uid = currentUser.uid;

  unsubKinder = onSnapshot(collection(db, "kunden", uid, "kinder"), snap => {
    kinder = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });

  unsubTarife = onSnapshot(collection(db, "kunden", uid, "tarife"), async snap => {
    if (snap.empty) {
      // seed default tarife
      for (const t of DEFAULT_TARIFE) {
        await setDoc(doc(db, "kunden", uid, "tarife", t.id), t);
      }
    } else {
      tarife = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    }
  });
}

// ── CRUD KINDER ────────────────────────────────────────────
window._saveKind = async (data, id) => {
  const uid = currentUser.uid;
  const kindId = id || "kind_" + Date.now();
  await setDoc(doc(db, "kunden", uid, "kinder", kindId), data);
  closeModal("kindModal");
};

window._deleteKind = async (id) => {
  if (!confirm("Kind wirklich löschen?")) return;
  await deleteDoc(doc(db, "kunden", currentUser.uid, "kinder", id));
};

// ── CRUD TARIFE ────────────────────────────────────────────
window._saveTarif = async (data, id) => {
  const uid = currentUser.uid;
  const tarifId = id || "T" + Date.now();
  await setDoc(doc(db, "kunden", uid, "tarife", tarifId), data);
  closeModal("tarifModal");
};

window._deleteTarif = async (id) => {
  if (kinder.some(k => k.tarif === id)) { alert("Tarif wird noch verwendet!"); return; }
  if (!confirm("Tarif wirklich löschen?")) return;
  await deleteDoc(doc(db, "kunden", currentUser.uid, "tarife", id));
};

window._toggleSubv = async (id, current) => {
  const uid = currentUser.uid;
  const k = kinder.find(x => x.id === id);
  if (!k) return;
  await setDoc(doc(db, "kunden", uid, "kinder", id), { ...k, subv: !current });
};

// ── RENDER HELPERS ─────────────────────────────────────────
const WOCHENTAGE = ["Mo","Di","Mi","Do","Fr"];

function age(geb) {
  const d = new Date(geb), now = new Date();
  let a = now.getFullYear() - d.getFullYear();
  if (now < new Date(now.getFullYear(), d.getMonth(), d.getDate())) a--;
  return a;
}
function fmtDate(s) {
  if (!s) return "–";
  const [y,m,d] = s.split("-");
  return `${d}.${m}.${y}`;
}
function tarifOf(id) { return tarife.find(t => t.id === id) || {}; }
function monatlich(k) {
  const t = tarifOf(k.tarif);
  return (t.preis || 0) * (k.tage?.length || 0) * 4.33;
}
function totalUmsatz() { return kinder.reduce((s,k) => s + monatlich(k), 0); }
function subvList()   { return kinder.filter(k => k.subv); }
function privList()   { return kinder.filter(k => !k.subv); }

// ── TABS ───────────────────────────────────────────────────
let activeTab = "belegung";
window._setTab = (t) => { activeTab = t; renderAll(); };

// ── MODAL ──────────────────────────────────────────────────
window._openKindModal = (id) => {
  const k = id ? kinder.find(x => x.id === id) : null;
  const f = k || { name:"", geb:"", tage:[], subv:false, tarif: tarife[0]?.id||"A", eintritt:"", austritt:"", eltern:"" };
  document.getElementById("kindModalTitle").textContent = k ? "Kind bearbeiten" : "Neues Kind";
  document.getElementById("kmName").value    = f.name;
  document.getElementById("kmGeb").value     = f.geb;
  document.getElementById("kmEltern").value  = f.eltern;
  document.getElementById("kmEintritt").value= f.eintritt;
  document.getElementById("kmAustritt").value= f.austritt;
  document.getElementById("kmSubv").checked  = f.subv;
  const tarifSel = document.getElementById("kmTarif");
  tarifSel.innerHTML = tarife.map(t => `<option value="${t.id}" ${f.tarif===t.id?"selected":""}>${t.name} — CHF ${t.preis}/T</option>`).join("");
  const tageDiv = document.getElementById("kmTage");
  tageDiv.innerHTML = WOCHENTAGE.map(d =>
    `<button type="button" class="tag-btn ${f.tage?.includes(d)?'active':''}" onclick="this.classList.toggle('active')">${d}</button>`
  ).join("");
  document.getElementById("kmSaveBtn").onclick = () => {
    const tage = [...document.querySelectorAll("#kmTage .tag-btn.active")].map(b => b.textContent);
    _saveKind({
      name:     document.getElementById("kmName").value.trim(),
      geb:      document.getElementById("kmGeb").value,
      eltern:   document.getElementById("kmEltern").value.trim(),
      eintritt: document.getElementById("kmEintritt").value,
      austritt: document.getElementById("kmAustritt").value,
      subv:     document.getElementById("kmSubv").checked,
      tarif:    document.getElementById("kmTarif").value,
      tage
    }, id || null);
  };
  document.getElementById("kindModal").classList.add("open");
};

window._openTarifModal = (id) => {
  const t = id ? tarife.find(x => x.id === id) : null;
  const f = t || { id:"", name:"", preis:0, beschr:"" };
  document.getElementById("tarifModalTitle").textContent = t ? "Tarif bearbeiten" : "Neuer Tarif";
  document.getElementById("tmId").value     = f.id;
  document.getElementById("tmName").value   = f.name;
  document.getElementById("tmPreis").value  = f.preis;
  document.getElementById("tmBeschr").value = f.beschr;
  document.getElementById("tmSaveBtn").onclick = () => {
    _saveTarif({
      id:     document.getElementById("tmId").value.trim(),
      name:   document.getElementById("tmName").value.trim(),
      preis:  Number(document.getElementById("tmPreis").value),
      beschr: document.getElementById("tmBeschr").value.trim(),
    }, id || document.getElementById("tmId").value.trim() || null);
  };
  document.getElementById("tarifModal").classList.add("open");
};

window.closeModal = (id) => document.getElementById(id).classList.remove("open");

// ── RENDER ─────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderTabNav();
  const c = document.getElementById("tabContent");
  if      (activeTab === "belegung") c.innerHTML = renderBelegung();
  else if (activeTab === "forecast") c.innerHTML = renderForecast();
  else if (activeTab === "subv")     c.innerHTML = renderSubv();
}

function renderStats() {
  const total = kinder.length;
  const subv  = subvList().length;
  const ausl  = Math.round((total / 20) * 100);
  const umsatz= Math.round(totalUmsatz());
  document.getElementById("statBar").innerHTML = `
    <div class="stat-item"><span class="stat-icon">👶</span><span class="stat-label">Kinder</span><strong>${total}</strong></div>
    <div class="stat-item"><span class="stat-icon">🏛️</span><span class="stat-label">Subventioniert</span><strong>${subv}</strong></div>
    <div class="stat-item"><span class="stat-icon">📊</span><span class="stat-label">Auslastung</span><strong class="${ausl>80?'green':ausl>60?'amber':'red'}">${ausl}%</strong></div>
    <div class="stat-item"><span class="stat-icon">💰</span><span class="stat-label">Umsatz/Mt.</span><strong>CHF ${umsatz.toLocaleString("de-CH")}</strong></div>
  `;
}

function renderTabNav() {
  const tabs = [
    { id:"belegung", icon:"👶", label:"Belegungsliste" },
    { id:"forecast", icon:"📈", label:"Forecast" },
    { id:"subv",     icon:"🏛️", label:"Subventionen" },
  ];
  document.getElementById("tabNav").innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="_setTab('${t.id}')">${t.icon} ${t.label}</button>`
  ).join("");
}

// ── BELEGUNGSLISTE ─────────────────────────────────────────
function renderBelegung() {
  const rows = kinder.map((k, i) => {
    const t = tarifOf(k.tarif);
    return `
    <tr class="${i%2===0?'even':'odd'}">
      <td><div class="kind-name">${k.name}</div><div class="kind-sub">${k.eltern||"–"}</div></td>
      <td class="muted">${k.geb ? age(k.geb)+" J." : "–"}</td>
      <td>
        <div class="tage-row">
          ${WOCHENTAGE.map(d=>`<span class="tage-chip ${k.tage?.includes(d)?'active':''}">${d}</span>`).join("")}
        </div>
      </td>
      <td><div class="fw6">${t.name||"–"}</div><div class="fs11 muted">CHF ${t.preis||0}/T</div></td>
      <td>${k.subv ? '<span class="badge green">Subv.</span>' : '<span class="badge amber">Privat</span>'}</td>
      <td class="muted fs12">${fmtDate(k.eintritt)}</td>
      <td class="muted fs12">${fmtDate(k.austritt)}</td>
      <td>
        <div class="action-row">
          <button class="btn-icon" onclick="_openKindModal('${k.id}')">✏️</button>
          <button class="btn-icon danger" onclick="_deleteKind('${k.id}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join("");

  return `
  <div class="toolbar">
    <input id="srch" class="search-input" placeholder="🔍  Name oder Elternteil…" oninput="filterTable(this.value)"/>
    <button class="btn-primary" onclick="_openKindModal()">+ Kind erfassen</button>
  </div>
  <div class="card table-wrap">
    <table id="kinderTable">
      <thead>
        <tr>${["Kind","Alter","Tage","Tarif","Subv.","Eintritt","Austritt",""].map(h=>`<th>${h}</th>`).join("")}</tr>
      </thead>
      <tbody id="kinderBody">${rows}</tbody>
    </table>
    ${kinder.length===0?'<div class="empty">Noch keine Kinder erfasst.</div>':""}
  </div>
  <div class="tally">${kinder.length} Kinder erfasst</div>`;
}

window.filterTable = (q) => {
  const ql = q.toLowerCase();
  document.querySelectorAll("#kinderBody tr").forEach(tr => {
    const txt = tr.textContent.toLowerCase();
    tr.style.display = txt.includes(ql) ? "" : "none";
  });
};

// ── FORECAST ──────────────────────────────────────────────
function renderForecast() {
  const now = new Date();
  const months = Array.from({ length: 24 }, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    return { label: d.toLocaleDateString("de-CH", { month:"short", year:"2-digit" }), date: d };
  });

  const dp = months.map(m => {
    const active = kinder.filter(k => {
      if (!k.eintritt || !k.austritt) return false;
      return new Date(k.eintritt) <= m.date && new Date(k.austritt) >= m.date;
    });
    const subv = active.filter(k=>k.subv).length;
    const umsatz = active.reduce((s,k)=>s+monatlich(k),0);
    return { ...m, total: active.length, subv, priv: active.length-subv, umsatz };
  });

  const maxTotal = Math.max(...dp.map(d=>d.total), 1);
  const H = 100;

  const bars = dp.map((d, i) => {
    const h = Math.max(Math.round((d.total/maxTotal)*H), 2);
    const shade = i===0?"var(--primary)":i<6?"#4B88E8":"#93C5FD";
    return `<div class="bar-col">
      <div class="bar-tip">${d.total}</div>
      <div class="bar" style="height:${h}px;background:${shade}" title="${d.label}: ${d.total} Kinder (${d.subv} subv.)"></div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  }).join("");

  const rows = dp.map((d, i) => `
    <tr class="${i%2===0?'even':'odd'}">
      <td class="${i===0?'fw7':''}">${d.label}</td>
      <td><strong>${d.total}</strong></td>
      <td class="muted">${d.priv}</td>
      <td>${d.subv>0?`<span class="badge green">${d.subv}</span>`:'<span class="muted">0</span>'}</td>
      <td>
        <div class="prog-row">
          <div class="prog-bg"><div class="prog-fill" style="width:${Math.round((d.total/20)*100)}%;background:${d.total<10?'var(--amber)':'var(--green)'}"></div></div>
          <span class="fs11 muted">${Math.round((d.total/20)*100)}%</span>
        </div>
      </td>
      <td class="fw6 green">CHF ${Math.round(d.umsatz).toLocaleString("de-CH")}</td>
    </tr>`).join("");

  return `
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Belegungsentwicklung — 24 Monate</div>
    <div class="card-sub">Prognose basierend auf Ein-/Austrittsdaten</div>
    <div class="chart-wrap">
      <div class="chart-bars">${bars}</div>
    </div>
    <div class="legend-row">
      <div class="legend-item"><span class="dot" style="background:var(--primary)"></span>Aktuell</div>
      <div class="legend-item"><span class="dot" style="background:#4B88E8"></span>1–6 Mt.</div>
      <div class="legend-item"><span class="dot" style="background:#93C5FD"></span>7–24 Mt.</div>
    </div>
  </div>
  <div class="card table-wrap">
    <table>
      <thead><tr>${["Monat","Total","Privat","Subv.","Auslastung","Umsatz/Mt."].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── SUBVENTIONIERUNG ───────────────────────────────────────
function renderSubv() {
  const sv   = subvList();
  const pr   = privList();
  const svR  = Math.round((sv.length/(kinder.length||1))*100);
  const uSv  = sv.reduce((s,k)=>s+monatlich(k),0);
  const uPr  = pr.reduce((s,k)=>s+monatlich(k),0);
  const beit = uSv * 0.4;

  const circumference = 2 * Math.PI * 15.9;
  const svDash  = (svR/100)*circumference;
  const prDash  = ((100-svR)/100)*circumference;
  const offset  = circumference * 0.25;

  const rows = kinder.map((k, i) => {
    const t = tarifOf(k.tarif);
    const mt = monatlich(k);
    const b = k.subv ? mt*0.4 : 0;
    return `
    <tr class="${i%2===0?'even':'odd'}">
      <td class="fw7">${k.name}</td>
      <td class="muted">${t.name||"–"}</td>
      <td>${k.tage?.length||0}×/Woche</td>
      <td>${k.subv?'<span class="badge green">Subventioniert</span>':'<span class="badge amber">Privat</span>'}</td>
      <td class="${k.subv?'fw6 green':'muted'}">${k.subv?`CHF ${Math.round(b).toLocaleString("de-CH")}`:"–"}</td>
      <td>
        <button class="btn-sm ${k.subv?'danger':'success'}" onclick="_toggleSubv('${k.id}',${k.subv})">
          ${k.subv?"Entfernen":"Subv. setzen"}
        </button>
      </td>
    </tr>`;
  }).join("");

  return `
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat-card"><div class="sc-icon">🏛️</div><div class="sc-val green">${sv.length}</div><div class="sc-lbl">Subventionierte Plätze</div><div class="sc-sub">${svR}% aller Plätze</div></div>
    <div class="stat-card"><div class="sc-icon">👨‍👩‍👧</div><div class="sc-val amber">${pr.length}</div><div class="sc-lbl">Private Plätze</div><div class="sc-sub">${100-svR}% aller Plätze</div></div>
    <div class="stat-card"><div class="sc-icon">💰</div><div class="sc-val primary">CHF ${Math.round(beit/1000*10)/10}k</div><div class="sc-lbl">Subventionsbeitrag/Mt.</div><div class="sc-sub">ca. 40% Modell</div></div>
    <div class="stat-card"><div class="sc-icon">📊</div><div class="sc-val">${`CHF ${Math.round((uSv+uPr)/1000*10)/10}k`}</div><div class="sc-lbl">Gesamtumsatz/Mt.</div></div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Aufteilung Plätze</div>
    <div class="donut-row">
      <svg width="110" height="110" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.9" fill="none" stroke="#E2E6EC" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--green)" stroke-width="4"
          stroke-dasharray="${svDash.toFixed(1)} ${(circumference-svDash).toFixed(1)}"
          stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--amber)" stroke-width="4"
          stroke-dasharray="${prDash.toFixed(1)} ${(circumference-prDash).toFixed(1)}"
          stroke-dashoffset="${(offset-svDash).toFixed(1)}" stroke-linecap="round"/>
        <text x="21" y="25" text-anchor="middle" font-size="7" font-weight="800" fill="var(--text)">${svR}%</text>
      </svg>
      <div class="donut-legend">
        <div class="dl-item"><span class="dot green-bg"></span><div><div class="fw6">${sv.length} subventioniert</div><div class="fs11 muted">CHF ${Math.round(uSv).toLocaleString("de-CH")}/Mt.</div></div></div>
        <div class="dl-item"><span class="dot amber-bg"></span><div><div class="fw6">${pr.length} privat</div><div class="fs11 muted">CHF ${Math.round(uPr).toLocaleString("de-CH")}/Mt.</div></div></div>
      </div>
    </div>
  </div>

  <div class="card table-wrap">
    <table>
      <thead><tr>${["Kind","Tarif","Tage/Woche","Status","Beitrag/Mt.","Aktion"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows||'<tr><td colspan="6" class="empty">Noch keine Kinder erfasst.</td></tr>'}</tbody>
    </table>
  </div>`;
}

// ── SHOW/HIDE ──────────────────────────────────────────────
function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appScreen").style.display   = "none";
}
function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display   = "block";
  document.getElementById("userEmail").textContent = currentUser.email;
}

</script>

<style>
  :root {
    --primary: #1A56C4;
    --primary-light: #EBF0FB;
    --green: #16A34A;
    --green-light: #DCFCE7;
    --amber: #D97706;
    --amber-light: #FEF3C7;
    --red: #DC2626;
    --red-light: #FEE2E2;
    --text: #111827;
    --muted: #6B7280;
    --border: #E2E6EC;
    --bg: #F4F6FA;
    --surface: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1A56C4 0%, #0F3585 100%);
  }
  .login-box {
    background: var(--surface);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .login-logo { font-size: 32px; margin-bottom: 4px; }
  .login-title { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .login-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; }
  .form-group input:focus { border-color: var(--primary); }
  .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity .15s; }
  .login-btn:hover { opacity: .9; }
  #loginErr { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }

  /* ── APP SHELL ── */
  #appScreen { display: none; }

  header {
    background: var(--primary);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0 0;
  }
  .logo-icon { font-size: 24px; }
  .logo-text { font-family: 'Sora', sans-serif; color: white; font-weight: 800; font-size: 18px; line-height: 1; }
  .logo-sub  { color: rgba(255,255,255,.5); font-size: 11px; }
  .header-spacer { flex: 1; }
  .user-info { color: rgba(255,255,255,.7); font-size: 12px; }
  .logout-btn { background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.25); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .logout-btn:hover { background: rgba(255,255,255,.25); }

  /* tab nav */
  #tabNav { display: flex; gap: 2px; margin-top: 10px; }
  .tab-btn {
    background: none; color: rgba(255,255,255,.6);
    border: none; border-bottom: 2px solid transparent;
    padding: 10px 16px; font-size: 13px; font-weight: 700;
    cursor: pointer; border-radius: 6px 6px 0 0;
    transition: all .15s;
  }
  .tab-btn.active { background: rgba(255,255,255,.12); color: white; border-bottom-color: white; }
  .tab-btn:hover:not(.active) { color: rgba(255,255,255,.85); }

  /* stat bar */
  #statBar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 24px; flex-wrap: wrap;
    padding: 12px 24px;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-icon { font-size: 14px; }
  .stat-label { font-size: 12px; color: var(--muted); }
  .stat-item strong { font-size: 13px; font-weight: 800; }
  strong.green { color: var(--green); }
  strong.amber { color: var(--amber); }
  strong.red   { color: var(--red); }

  /* main */
  main { max-width: 1100px; margin: 0 auto; padding: 24px 24px 60px; }
  .page-title { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 18px; }

  /* card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; }
  .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 200px; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
  .search-input:focus { border-color: var(--primary); }
  .btn-primary { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn-primary:hover { opacity: .9; }

  /* table */
  .table-wrap { overflow-x: auto; padding: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr.even { background: white; }
  tr.odd  { background: #FAFBFC; }
  tr:last-child td { border-bottom: none; }

  .kind-name { font-weight: 700; }
  .kind-sub  { font-size: 11px; color: var(--muted); }
  .muted     { color: var(--muted); }
  .fw6       { font-weight: 600; }
  .fw7       { font-weight: 700; }
  .fs11      { font-size: 11px; }
  .fs12      { font-size: 12px; }
  .green     { color: var(--green); }
  .amber     { color: var(--amber); }

  .tage-row  { display: flex; gap: 3px; flex-wrap: wrap; }
  .tage-chip { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: var(--bg); color: var(--border); }
  .tage-chip.active { background: var(--primary-light); color: var(--primary); }

  .badge { border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; letter-spacing: .3px; }
  .badge.green  { background: var(--green-light); color: #166534; }
  .badge.amber  { background: var(--amber-light); color: #92400e; }

  .action-row { display: flex; gap: 6px; }
  .btn-icon   { background: none; border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
  .btn-icon.danger { border-color: var(--red-light); color: var(--red); }
  .btn-sm     { border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .btn-sm.danger  { background: var(--red-light); color: var(--red); }
  .btn-sm.success { background: var(--green-light); color: var(--green); }

  .tally { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* chart */
  .chart-wrap { overflow-x: auto; padding-bottom: 4px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 5px; min-width: 860px; height: 130px; padding: 0 4px 24px; position: relative; }
  .bar-col    { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .bar        { width: 100%; border-radius: 3px 3px 0 0; transition: opacity .15s; cursor: default; }
  .bar:hover  { opacity: .8; }
  .bar-tip    { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
  .bar-label  { font-size: 9px; color: var(--muted); transform: rotate(-40deg); transform-origin: top left; white-space: nowrap; margin-top: 6px; margin-left: 6px; }
  .legend-row { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item{ display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .dot        { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .green-bg   { background: var(--green); }
  .amber-bg   { background: var(--amber); }

  /* progress */
  .prog-row  { display: flex; align-items: center; gap: 8px; }
  .prog-bg   { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; min-width: 60px; }
  .prog-fill { height: 100%; border-radius: 3px; }

  /* stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 12px; }
  .stat-card  { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .sc-icon    { font-size: 20px; margin-bottom: 8px; }
  .sc-val     { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; line-height: 1; }
  .sc-val.primary { color: var(--primary); }
  .sc-val.green   { color: var(--green); }
  .sc-val.amber   { color: var(--amber); }
  .sc-lbl     { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .sc-sub     { font-size: 11px; color: var(--border); margin-top: 2px; }

  /* donut */
  .donut-row    { display: flex; align-items: center; gap: 24px; }
  .donut-legend { display: flex; flex-direction: column; gap: 12px; }
  .dl-item      { display: flex; align-items: center; gap: 10px; }
  .dl-item .dot { flex-shrink: 0; }

  /* modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border-radius: 14px;
    padding: 28px 28px 24px; width: 100%; max-width: 520px;
    box-shadow: 0 24px 64px rgba(0,0,0,.18);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 800; color: var(--primary); margin-bottom: 18px; }
  .modal-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-grid .full { grid-column: 1/-1; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--primary); }
  .modal-tage { display: flex; gap: 6px; margin-top: 4px; }
  .tag-btn    { padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--bg); color: var(--muted); }
  .tag-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .modal-check { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 13px; cursor: pointer; }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save   { flex: 1; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-cancel { padding: 10px 18px; background: none; color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; }

  @media (max-width: 600px) {
    header, #statBar, main { padding-left: 14px; padding-right: 14px; }
    .modal-grid { grid-template-columns: 1fr; }
    .modal-grid .full { grid-column: 1; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏡</div>
    <div class="login-title">KitaPlaner</div>
    <div class="login-sub">Verwaltungssoftware für Schweizer Kitas</div>
    <div class="form-group">
      <label>E-Mail</label>
      <input id="loginEmail" type="email" placeholder="name@kita.ch" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input id="loginPw" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')_login()"/>
    </div>
    <button class="login-btn" onclick="_login()">Anmelden</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="appScreen">

  <header>
    <div class="header-top">
      <div class="logo-icon">🏡</div>
      <div>
        <div class="logo-text">KitaPlaner</div>
        <div class="logo-sub">Verwaltung · Schweiz</div>
      </div>
      <div class="header-spacer"></div>
      <span class="user-info" id="userEmail"></span>
      <button class="logout-btn" onclick="_logout()">Abmelden</button>
    </div>
    <div id="tabNav"></div>
  </header>

  <div id="statBar"></div>

  <main>
    <div class="page-title" id="pageTitle"></div>
    <div id="tabContent"></div>
  </main>
</div>

<!-- ── MODAL: KIND ── -->
<div class="modal-overlay" id="kindModal" onclick="if(event.target===this)closeModal('kindModal')">
  <div class="modal-box">
    <div class="modal-title" id="kindModalTitle">Kind erfassen</div>
    <div class="modal-grid">
      <div class="field full">
        <label>Name des Kindes</label>
        <input id="kmName" type="text" placeholder="Vorname Nachname"/>
      </div>
      <div class="field">
        <label>Geburtsdatum</label>
        <input id="kmGeb" type="date"/>
      </div>
      <div class="field">
        <label>Elternteil / Kontakt</label>
        <input id="kmEltern" type="text" placeholder="Name Elternteil"/>
      </div>
      <div class="field">
        <label>Eintritt</label>
        <input id="kmEintritt" type="date"/>
      </div>
      <div class="field">
        <label>Austritt</label>
        <input id="kmAustritt" type="date"/>
      </div>
      <div class="field">
        <label>Tarif</label>
        <select id="kmTarif"></select>
      </div>
      <div class="field full">
        <label>Anwesenheitstage</label>
        <div class="modal-tage" id="kmTage"></div>
      </div>
      <div class="field full">
        <label class="modal-check">
          <input id="kmSubv" type="checkbox"/> Subventionierter Platz
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" id="kmSaveBtn">Speichern</button>
      <button class="btn-cancel" onclick="closeModal('kindModal')">Abbrechen</button>
    </div>
  </div>
</div>

<!-- ── MODAL: TARIF ── -->
<div class="modal-overlay" id="tarifModal" onclick="if(event.target===this)closeModal('tarifModal')">
  <div class="modal-box">
    <div class="modal-title" id="tarifModalTitle">Tarif erfassen</div>
    <div class="modal-grid">
      <div class="field">
        <label>Kürzel (z.B. A)</label>
        <input id="tmId" type="text" placeholder="A"/>
      </div>
      <div class="field">
        <label>Bezeichnung</label>
        <input id="tmName" type="text" placeholder="Basis"/>
      </div>
      <div class="field">
        <label>Preis (CHF / Tag)</label>
        <input id="tmPreis" type="number" placeholder="85"/>
      </div>
      <div class="field">
        <label>Beschreibung</label>
        <input id="tmBeschr" type="text" placeholder="2–3 Tage/Woche"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" id="tmSaveBtn">Speichern</button>
      <button class="btn-cancel" onclick="closeModal('tarifModal')">Abbrechen</button>
    </div>
  </div>
</div>

</body>
</html>
